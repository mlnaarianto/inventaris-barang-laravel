services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: philo_app
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - db
    mem_limit: 512m
    cpus: 0.75

  web:
    image: nginx:latest
    container_name: philo_web
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    mem_limit: 256m
    cpus: 0.25

  db:
    image: mysql:8.0
    container_name: philo_db
    command: >
      --innodb-buffer-pool-size=256M
      --max-connections=40
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: philo
    ports:
      - "3308:3306"
    volumes:
      - philo_dbdata:/var/lib/mysql
    mem_limit: 1g
    cpus: 0.75

volumes:
  philo_dbdata: